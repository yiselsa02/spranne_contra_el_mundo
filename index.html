<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carta 💌</title>

<style>
/* RESET GENERAL */
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #ffc0cb, #ff9eb5);
    font-family: 'Georgia', serif;
    overflow: hidden;
}

/* CORAZONES FLOTANTES */
.corazon {
    position: absolute;
    color: #ff4d6d;
    animation: flotar 6s linear infinite;
    font-size: 20px;
    z-index: 1;
    pointer-events: none; /* Para que no estorben al hacer click */
}

@keyframes flotar {
    0% { transform: translateY(100vh); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: translateY(-10vh); opacity: 0; }
}

/* SOBRE (TRIGGER) */
.sobre {
    position: absolute;
    width: 280px;
    height: 180px;
    background: #ff8fab;
    border: 2px solid #d14;
    cursor: pointer;
    z-index: 5;
    transition: 0.5s;
    display: flex;
    justify-content: center;
    align-items: center;
}

.tapa {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #ffb3c6;
    clip-path: polygon(0 0, 50% 50%, 100% 0);
    transform-origin: top;
    transition: 0.8s;
    top: 0;
}

.sobre.abierto {
    opacity: 0;
    pointer-events: none;
    transform: scale(0.5);
}

/* CARTA (EL CONTENEDOR PRINCIPAL) */
.carta {
    width: 90%;
    max-width: 650px; /* Ancho máximo en PC */
    max-height: 85vh; /* No se sale de la pantalla en móvil */
    background: linear-gradient(135deg, #ffffff, #ff99d4);
    position: relative;
    transform: scale(0);
    border-radius: 15px;
    padding: 30px;
    box-shadow: 0 0 30px rgba(0,0,0,0.3);
    transition: 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    z-index: 10;
    overflow-y: auto; /* Permite scroll si el texto es muy largo */
}

/* Cuando el sobre tiene la clase 'abierto', la carta escala a 1 */
.sobre.abierto + .carta {
    transform: scale(1);
}

h1 {
    text-align: center;
    color: #d14;
    margin-top: 0;
    font-size: 1.8rem;
}

.texto {
    font-size: 1.1rem;
    line-height: 1.6;
    color: #333;
    text-align: center;
    margin-bottom: 20px;
}

/* DISPOSICIÓN DE CONTENIDO (FLEXBOX) */
.contenido {
    display: flex;
    flex-wrap: wrap; /* Permite que las columnas bajen en móvil */
    gap: 20px;
    justify-content: center;
}

.columna-izq, .columna-der {
    flex: 1;
    min-width: 250px; /* Evita que se compriman demasiado */
    display: flex;
    flex-direction: column;
    gap: 15px;
    align-items: center;
}

/* IMÁGENES */
.imagen {
    width: 100%;
    height: 200px;
    background: url('https://i.pinimg.com/1200x/39/34/29/3934294f53c0d0d4c59a11b62c9b49b0.jpg') center/cover no-repeat;
    border-radius: 15px;
}

.imagen-derecha {
    width: 100%;
    height: 250px;
    background: url('https://i.pinimg.com/736x/5c/f9/af/5cf9aff68349727fc5eae2290a1574b0.jpg') center/cover no-repeat;
    border-radius: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

/* LISTA */
.lista-amor {
    background: linear-gradient(135deg, #ff4d88, #ff80aa);
    padding: 15px;
    border-radius: 12px;
    color: white;
    width: 100%;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.lista-amor h3 { margin-top: 0; font-size: 1.1rem; }
.lista-amor ul { padding-left: 20px; margin: 0; }

/* BOTONES Y MENSAJES */
.btn-desplegar {
    background: #d14;
    color: white;
    border: none;
    padding: 12px 20px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

.btn-desplegar:hover { background: #a10; }

.mensaje-oculto {
    max-height: 0;
    overflow: hidden;
    transition: 0.5s ease-in-out;
    background: rgba(255, 255, 255, 0.5);
    border-radius: 8px;
    text-align: center;
    font-style: italic;
}

.mensaje-oculto.abierto {
    max-height: 150px;
    padding: 10px;
}

/* BOTÓN MÚSICA */
.boton {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #d14;
    color: white;
    border: none;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    cursor: pointer;
    z-index: 999;
    font-size: 20px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

/* RESPONSIVE (MÓVILES) */
@media (max-width: 600px) {
    .carta {
        padding: 20px;
        width: 95%;
    }

    h1 { font-size: 1.4rem; }

    .columna-izq, .columna-der {
        min-width: 100%; /* Las columnas ocupan todo el ancho */
    }

    .imagen, .imagen-derecha {
        height: 180px; /* Imágenes más pequeñas en móvil */
    }

    .boton {
        bottom: 15px;
        right: 15px;
        width: 45px;
        height: 45px;
    }
}
</style>
</head>

<body>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carta 💌</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="sobre" onclick="abrirCarta()">
    <div class="tapa"></div>
</div>

<div class="carta">
    <h1>Para mi amor 💖</h1>

    <div class="texto">
        Desde que llegaste a mi vida todo es más bonito... 💕  
        Gracias por existir 😭✨
    </div>

    <div class="contenido">
        <div class="columna-izq">
            <div class="imagen"></div>

            <div class="lista-amor">
                <h3>💖 Lo que amo de ti</h3>
                <ul>
                    <li>Tu sonrisa 😭</li>
                    <li>Tu forma de ser 💕</li>
                    <li>Cómo me haces feliz ✨</li>
                </ul>
            </div>
        </div>

        <div class="columna-der">
            <button class="btn-desplegar" onclick="mostrarMensaje()">
                💌 Haz click aquí
            </button>

            <div id="mensaje" class="mensaje-oculto">
                Aquí va tu mensaje secreto 💕
            </div>

            <div class="imagen-derecha"></div>
        </div>
    </div>
</div>

<button id="musica" class="boton">🎵</button>

<script src="script.js"></script>
</body>
</html>

<script>
// CORAZONES
for(let i=0;i<20;i++){
    let corazon=document.createElement("div");
    corazon.className="corazon";
    corazon.innerHTML="💚";
    corazon.style.left=Math.random()*100+"vw";
    corazon.style.animationDuration=(3+Math.random()*3)+"s";
    document.body.appendChild(corazon);
}

// ABRIR CARTA
function abrirCarta(){
    document.querySelector(".sobre").classList.add("abierto");
}

// MENSAJE OCULTO
function mostrarMensaje(){
    document.getElementById("mensaje").classList.toggle("abierto");
}

// BOTÓN MÚSICA
document.getElementById("musica").addEventListener("click", () => {
    window.open('https://www.youtube.com/watch?v=t_7M1q6rFT4&list=RDt_7M1q6rFT4&start_radio=1', '_blank');
});
</script>

</body>
</html>
